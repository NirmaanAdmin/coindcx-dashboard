<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoinDCX Futures Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;padding:20px;min-height:100vh}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.header h1{font-size:22px;font-weight:600;color:#fff}
.header h1 span{color:#6366f1;font-weight:400}
.header-right{display:flex;align-items:center;gap:16px;font-size:13px;color:#888}
.refresh-btn{background:#1a1a2e;border:1px solid #2a2a3e;color:#aaa;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px}
.refresh-btn:hover{background:#2a2a3e;color:#fff}
.live-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;animation:pulse 2s infinite}
.live-dot.warn{background:#f59e0b}
.live-dot.err{background:#ef4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.error-banner{background:#2a1212;border:1px solid #5a1f1f;color:#fca5a5;padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:13px;display:flex;align-items:flex-start;gap:10px}
.error-banner .err-title{color:#ef4444;font-weight:600;margin-right:8px}
.error-banner .err-detail{color:#fca5a5;font-family:'SF Mono',Monaco,monospace;font-size:12px;word-break:break-word}
.error-banner a{color:#f59e0b;text-decoration:underline}
.warn-banner{background:#2a1f0a;border:1px solid #5a3f1f;color:#fcd34d;padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:12px}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.kpi{background:#12121e;border:1px solid #1e1e30;border-radius:10px;padding:16px}
.kpi-label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi-value{font-size:22px;font-weight:600;color:#fff}
.kpi-sub{font-size:11px;color:#666;margin-top:2px}
.green{color:#22c55e}.red{color:#ef4444}.amber{color:#f59e0b}

.charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.chart-card{background:#12121e;border:1px solid #1e1e30;border-radius:10px;padding:16px}
.chart-card h3{font-size:13px;color:#888;font-weight:500;margin-bottom:12px}
.chart-card .chart-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.chart-card .chart-header h3{margin-bottom:0}
.chart-wrap{position:relative;height:250px}
.filter-row{display:flex;align-items:center;gap:6px;font-size:12px;flex-wrap:wrap}
.filter-row label{color:#888}
.filter-row input[type="date"]{background:#1a1a28;border:1px solid #2a2a3e;color:#ccc;padding:4px 8px;border-radius:5px;font-size:12px;font-family:inherit;color-scheme:dark}
.filter-row .filter-btn{background:#1a1a28;border:1px solid #2a2a3e;color:#aaa;padding:4px 10px;border-radius:5px;cursor:pointer;font-size:12px}
.filter-row .filter-btn:hover{background:#2a2a3e;color:#fff}
.filter-row .filter-btn.active{background:#3730a3;border-color:#4f46e5;color:#fff}
.filter-row .count{color:#666;font-size:11px;margin-left:6px}

.section{background:#12121e;border:1px solid #1e1e30;border-radius:10px;padding:16px;margin-bottom:16px}
.section h3{font-size:13px;color:#888;font-weight:500;margin-bottom:12px}
.section-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.section-header h3{margin-bottom:0}
.export-btn{background:#1a1a28;border:1px solid #2a2a3e;color:#aaa;padding:5px 12px;border-radius:5px;cursor:pointer;font-size:12px;display:inline-flex;align-items:center;gap:6px}
.export-btn:hover{background:#1f4d2f;border-color:#22c55e;color:#fff}
.export-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}

table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 6px;color:#666;font-weight:500;border-bottom:1px solid #1e1e30;position:sticky;top:0;background:#12121e;cursor:pointer;user-select:none;white-space:nowrap}
th.sortable:hover{color:#fff;background:#1a1a28}
th.no-sort{cursor:default}
th.no-sort:hover{color:#666;background:#12121e}
th .sort-arrow{display:inline-block;margin-left:3px;font-size:9px;opacity:0.4;width:8px}
th.sorted .sort-arrow{opacity:1;color:#6366f1}
th.sorted{color:#fff}
td{padding:7px 6px;border-bottom:1px solid #1a1a28}
tr:hover td{background:#1a1a28}
.text-right{text-align:right}
.text-center{text-align:center}
.mono{font-family:'SF Mono',Monaco,monospace;font-size:11px}
.badge-tp{background:#0a2e1a;color:#22c55e;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500}
.badge-sl{background:#2e0a0a;color:#ef4444;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500}
.badge-long{background:#0a1a2e;color:#3b82f6;padding:2px 8px;border-radius:4px;font-size:10px}
.badge-short{background:#2e1a2e;color:#c084fc;padding:2px 8px;border-radius:4px;font-size:10px}

.daily-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #1a1a28}
.daily-date{width:80px;font-size:12px;color:#888}
.daily-bar-wrap{flex:1;height:20px;position:relative;display:flex;align-items:center}
.daily-bar{height:14px;border-radius:3px;min-width:2px}
.daily-stats{width:200px;font-size:11px;color:#888;text-align:right}

.loading{display:flex;align-items:center;justify-content:center;height:60vh;font-size:16px;color:#555}
.spinner{width:24px;height:24px;border:2px solid #333;border-top:2px solid #6366f1;border-radius:50%;animation:spin .8s linear infinite;margin-right:12px}
@keyframes spin{to{transform:rotate(360deg)}}

.empty{text-align:center;padding:48px 16px;color:#555}
.empty h2{color:#888;font-weight:500;font-size:18px;margin-bottom:8px}
.empty p{font-size:13px;margin-bottom:16px}
.empty code{background:#1a1a28;color:#aaa;padding:2px 8px;border-radius:4px;font-family:'SF Mono',Monaco,monospace;font-size:12px}

@media(max-width:768px){
  .charts{grid-template-columns:1fr}
  .kpi-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>
<div id="app">
  <div class="loading"><div class="spinner"></div>Loading trades from CoinDCX...</div>
</div>

<script>
let allData = null;
let refreshInterval = null;
let charts = {};

// Sort state for trade log: default is most recent first (newest on top)
let sortState = { key: 'exit_ts', dir: 'desc' };

// Per-trade P&L date filter: default = today (IST)
let perTradeFilter = { mode: 'today', date: todayIstDate() };

function todayIstDate() {
  // Returns YYYY-MM-DD for today in IST regardless of user's local zone
  const now = new Date();
  const ist = new Date(now.getTime() + (5 * 60 + 30) * 60 * 1000 - now.getTimezoneOffset() * 60 * 1000);
  return ist.toISOString().slice(0, 10);
}

async function fetchData() {
  try {
    const r = await fetch('/api/data', {cache: 'no-store'});
    allData = await r.json();
    render(allData);
  } catch(e) {
    document.getElementById('app').innerHTML = `
      <div class="error-banner">
        <div>
          <span class="err-title">NETWORK ERROR</span>
          <span class="err-detail">Could not reach the dashboard server: ${escapeHtml(e.message)}</span>
          <div style="margin-top:8px;color:#888">The server may be redeploying. This page will retry automatically.</div>
        </div>
      </div>`;
  }
}

function fmt(v) { v = v || 0; return v >= 0 ? '+₹' + v.toLocaleString('en-IN') : '-₹' + Math.abs(v).toLocaleString('en-IN'); }
function fmtPct(v) { v = v || 0; return (v >= 0 ? '+' : '') + v.toFixed(1) + '%'; }
function cls(v) { return (v || 0) >= 0 ? 'green' : 'red'; }

function ago(epoch) {
  if (!epoch) return 'never';
  const s = Math.floor(Date.now()/1000 - epoch);
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  return Math.floor(s/3600) + 'h ago';
}

function destroyCharts() {
  Object.values(charts).forEach(c => { try { c.destroy(); } catch(e) {} });
  charts = {};
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function getSortedTrades() {
  if (!allData || !allData.trades) return [];
  const { key, dir } = sortState;
  const sorted = [...allData.trades];
  sorted.sort((a, b) => {
    let av = a[key], bv = b[key];
    if (typeof av === 'string') {
      av = av.toLowerCase(); bv = (bv || '').toLowerCase();
      if (av < bv) return dir === 'asc' ? -1 : 1;
      if (av > bv) return dir === 'asc' ? 1 : -1;
      return 0;
    }
    av = av == null ? 0 : av;
    bv = bv == null ? 0 : bv;
    return dir === 'asc' ? av - bv : bv - av;
  });
  return sorted;
}

function setSort(key) {
  if (sortState.key === key) {
    sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
  } else {
    sortState.key = key;
    // Strings default asc; numbers/timestamps default desc
    sortState.dir = ['symbol', 'side', 'status'].includes(key) ? 'asc' : 'desc';
  }
  renderTradeTable();
}

function sortArrow(key) {
  if (sortState.key !== key) return '<span class="sort-arrow">↕</span>';
  return `<span class="sort-arrow">${sortState.dir === 'asc' ? '↑' : '↓'}</span>`;
}

function thClass(key) {
  return 'sortable' + (sortState.key === key ? ' sorted' : '');
}

function setPerTradeFilter(mode) {
  perTradeFilter.mode = mode;
  if (mode === 'today') perTradeFilter.date = todayIstDate();
  renderPnlChart();
  // Sync the date input + button visuals
  const dateInput = document.getElementById('pnlDateInput');
  if (dateInput) dateInput.value = perTradeFilter.date;
  document.querySelectorAll('.pnl-filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === perTradeFilter.mode);
  });
}

function setPerTradeDate(date) {
  perTradeFilter.mode = (date === todayIstDate()) ? 'today' : 'date';
  perTradeFilter.date = date;
  renderPnlChart();
  document.querySelectorAll('.pnl-filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === perTradeFilter.mode);
  });
}

function getFilteredPerTradeTrades() {
  if (!allData || !allData.trades) return [];
  const trades = [...allData.trades].sort((a, b) => a.exit_ts - b.exit_ts); // chronological for the bar chart x-axis
  if (perTradeFilter.mode === 'all') return trades;
  return trades.filter(t => t.exit_date === perTradeFilter.date);
}

function exportToExcel() {
  const trades = getSortedTrades();
  if (!trades.length) { alert('No trades to export.'); return; }

  const rows = trades.map((t, i) => ({
    '#': i + 1,
    'Symbol': t.symbol,
    'Pair': t.pair,
    'Side': t.side,
    'Entry Price': t.entry_price,
    'Exit Price': t.exit_price,
    'Quantity': t.qty,
    'Net P&L (INR)': t.net_inr,
    'P&L (USDT)': t.pnl_usdt,
    'Fees (USDT)': t.fees_usdt,
    'ROI %': t.roi,
    'Status': t.status,
    'Entry Time': t.entry_time,
    'Exit Time': t.exit_time,
    'Exit Date': t.exit_date,
  }));

  const ws = XLSX.utils.json_to_sheet(rows);
  const cols = Object.keys(rows[0]).map(k => {
    const maxLen = Math.max(k.length, ...rows.map(r => String(r[k] == null ? '' : r[k]).length));
    return { wch: Math.min(maxLen + 2, 30) };
  });
  ws['!cols'] = cols;

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Trades');

  const ts = new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-');
  XLSX.writeFile(wb, `coindcx-trades-${ts}.xlsx`);
}

function render(data) {
  destroyCharts();
  const { trades, stats, error, last_fetch_ok, stale, wallet } = data;
  const s = stats;
  const hasData = trades && trades.length > 0;
  const dotClass = error ? 'err' : (stale ? 'warn' : '');

  let banner = '';
  if (error) {
    banner = `
      <div class="error-banner">
        <div style="flex:1">
          <span class="err-title">FETCH ISSUE</span>
          <span class="err-detail">${escapeHtml(error)}</span>
          <div style="margin-top:6px;color:#888;font-size:11px">
            ${hasData ? `Showing cached data from ${ago(last_fetch_ok)}.` : 'No cached data available.'}
            Open <a href="/api/diagnose" target="_blank">/api/diagnose</a> or <a href="/api/health" target="_blank">/api/health</a> for details.
          </div>
        </div>
      </div>`;
  } else if (stale) {
    banner = `<div class="warn-banner">Data is stale (last successful fetch ${ago(last_fetch_ok)}). Trying to refresh.</div>`;
  }

  if (!hasData) {
    document.getElementById('app').innerHTML = `
      <div class="header">
        <h1>CoinDCX Futures <span>Dashboard</span></h1>
        <div class="header-right">
          <span><span class="live-dot ${dotClass}"></span> ${error ? 'Error' : 'Waiting'}</span>
          <button class="refresh-btn" onclick="manualRefresh()">Retry</button>
        </div>
      </div>
      ${banner}
      <div class="empty">
        <h2>No trades to display yet</h2>
        <p>Either no trades have been recorded since the configured start date,
           or the dashboard hasn't reached CoinDCX yet.</p>
        <p style="margin-top:12px">Check <a href="/api/health" target="_blank" style="color:#6366f1">/api/health</a>
           and <a href="/api/diagnose" target="_blank" style="color:#6366f1">/api/diagnose</a> for diagnostic info.</p>
      </div>`;
    return;
  }

  const maxDailyPnl = s.daily.length ? Math.max(...s.daily.map(d => Math.abs(d.pnl))) : 1;

  // Live wallet figure (from /positions). Falls back to closed-only if wallet fetch failed.
  const liveValue = (wallet && wallet.live_current_value_inr != null) ? wallet.live_current_value_inr : s.end;
  const openUnrealized = wallet ? (wallet.open_unrealized_inr || 0) : 0;
  const openCount = wallet ? (wallet.open_count || 0) : 0;
  const lockedMargin = wallet ? (wallet.open_locked_margin_inr || 0) : 0;
  const walletErr = wallet && wallet.error;

  document.getElementById('app').innerHTML = `
    <div class="header">
      <h1>CoinDCX Futures <span>Dashboard</span></h1>
      <div class="header-right">
        <span><span class="live-dot ${dotClass}"></span> Auto-refresh 30s</span>
        <span id="lastUpdate"></span>
        <button class="refresh-btn" onclick="manualRefresh()">Refresh Now</button>
      </div>
    </div>

    ${banner}

    <div class="kpi-grid">
      <div class="kpi">
        <div class="kpi-label">Net P&L (closed)</div>
        <div class="kpi-value ${cls(s.net_inr)}">${fmt(s.net_inr)}</div>
        <div class="kpi-sub">${fmtPct(s.return_pct)} on capital</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Sum ROI</div>
        <div class="kpi-value ${cls(s.sum_roi)}">${fmtPct(s.sum_roi)}</div>
        <div class="kpi-sub"><span class="green">+${(s.sum_tp_roi||0).toFixed(1)}%</span> / <span class="red">${(s.sum_sl_roi||0).toFixed(1)}%</span></div>
      </div>
      <div class="kpi" title="Starting capital + closed realized PnL + unrealized PnL on open positions">
        <div class="kpi-label">Current Value ${walletErr ? '<span class="amber" title="Live position fetch failed; showing closed-only">⚠</span>' : ''}</div>
        <div class="kpi-value">₹${liveValue.toLocaleString('en-IN', {maximumFractionDigits: 2})}</div>
        <div class="kpi-sub">
          ${openCount > 0
            ? `${openCount} open · <span class="${cls(openUnrealized)}">${fmt(openUnrealized)}</span> unrealized`
            : `from ₹${s.start.toLocaleString('en-IN')}`}
        </div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Win Rate</div>
        <div class="kpi-value ${s.wr >= 50 ? 'green' : 'red'}">${s.wr}%</div>
        <div class="kpi-sub">${s.wins}W / ${s.losses}L</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Trades</div>
        <div class="kpi-value">${s.total}</div>
        <div class="kpi-sub">${s.long_count}L / ${s.short_count}S</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Avg Win / Loss</div>
        <div class="kpi-value green">${fmt(s.avg_win)}</div>
        <div class="kpi-sub red">${fmt(s.avg_loss)}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Peak / Trough</div>
        <div class="kpi-value">₹${s.peak.toLocaleString('en-IN')}</div>
        <div class="kpi-sub">Low: ₹${s.trough.toLocaleString('en-IN')}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Total Fees</div>
        <div class="kpi-value red">₹${s.total_fees_inr.toLocaleString('en-IN')}</div>
      </div>
    </div>

    <div class="charts">
      <div class="chart-card">
        <h3>Equity curve</h3>
        <div class="chart-wrap"><canvas id="equityChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-header">
          <h3>Per-trade P&L</h3>
          <div class="filter-row">
            <button class="pnl-filter-btn filter-btn ${perTradeFilter.mode === 'today' ? 'active' : ''}" data-mode="today" onclick="setPerTradeFilter('today')">Today</button>
            <button class="pnl-filter-btn filter-btn ${perTradeFilter.mode === 'all' ? 'active' : ''}" data-mode="all" onclick="setPerTradeFilter('all')">All</button>
            <input type="date" id="pnlDateInput" value="${perTradeFilter.date}" onchange="setPerTradeDate(this.value)" />
            <span class="count" id="pnlChartCount"></span>
          </div>
        </div>
        <div class="chart-wrap"><canvas id="pnlChart"></canvas></div>
      </div>
    </div>

    ${s.daily.length > 1 ? `
    <div class="section">
      <h3>Daily breakdown</h3>
      ${s.daily.map(d => {
        const pct = Math.abs(d.pnl) / maxDailyPnl * 100;
        const color = d.pnl >= 0 ? '#22c55e' : '#ef4444';
        return `<div class="daily-row">
          <div class="daily-date">${d.date.slice(5)}</div>
          <div class="daily-bar-wrap">
            <div class="daily-bar" style="width:${Math.max(pct, 2)}%;background:${color}"></div>
          </div>
          <div class="daily-stats">
            <span class="${cls(d.pnl)}">${fmt(d.pnl)}</span>
            &nbsp; ${d.trades}T &nbsp; ${d.wr}% WR &nbsp;
            <span style="color:#555">Bal: ₹${d.cum.toLocaleString('en-IN')}</span>
          </div>
        </div>`;
      }).join('')}
    </div>` : ''}

    <div class="charts">
      <div class="chart-card">
        <h3>P&L by symbol</h3>
        <div style="position:relative;height:${Math.max(s.symbols.length * 28 + 40, 200)}px"><canvas id="symbolChart"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>Long vs Short</h3>
        <div style="position:relative;height:250px"><canvas id="sideChart"></canvas></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px">
          <div style="background:#1a1a28;border-radius:8px;padding:12px;border-left:3px solid #3b82f6">
            <div style="font-size:11px;color:#888">Long</div>
            <div style="font-size:18px;font-weight:600;color:#fff;margin:4px 0">${s.long_count} trades</div>
            <div style="font-size:13px;color:${s.long_wr >= 50 ? '#22c55e' : '#ef4444'}">${s.long_wr}% WR</div>
            <div style="font-size:13px" class="${cls(s.long_pnl)}">${fmt(s.long_pnl)}</div>
          </div>
          <div style="background:#1a1a28;border-radius:8px;padding:12px;border-left:3px solid #c084fc">
            <div style="font-size:11px;color:#888">Short</div>
            <div style="font-size:18px;font-weight:600;color:#fff;margin:4px 0">${s.short_count} trades</div>
            <div style="font-size:13px;color:${s.short_wr >= 50 ? '#22c55e' : '#ef4444'}">${s.short_wr}% WR</div>
            <div style="font-size:13px" class="${cls(s.short_pnl)}">${fmt(s.short_pnl)}</div>
          </div>
        </div>
      </div>
    </div>

    <div class="section" id="tradeLogSection">
      <div class="section-header">
        <h3>Trade log <span style="color:#555">(${trades.length} trades · click columns to sort)</span></h3>
        <button class="export-btn" onclick="exportToExcel()" title="Download all trades as .xlsx">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          Export to Excel
        </button>
      </div>
      <div style="max-height:500px;overflow-y:auto">
      <table id="tradeTable">
        <thead>
          <tr>
            <th class="no-sort">#</th>
            <th class="${thClass('symbol')}" onclick="setSort('symbol')">Symbol${sortArrow('symbol')}</th>
            <th class="${thClass('side')}" onclick="setSort('side')">Side${sortArrow('side')}</th>
            <th class="${thClass('entry_price')}" onclick="setSort('entry_price')">Entry${sortArrow('entry_price')}</th>
            <th class="${thClass('exit_price')}" onclick="setSort('exit_price')">Exit${sortArrow('exit_price')}</th>
            <th class="text-right ${thClass('net_inr')}" onclick="setSort('net_inr')">Net P&L${sortArrow('net_inr')}</th>
            <th class="text-right ${thClass('roi')}" onclick="setSort('roi')">ROI${sortArrow('roi')}</th>
            <th class="text-right ${thClass('exit_ts')}" onclick="setSort('exit_ts')">Time${sortArrow('exit_ts')}</th>
            <th class="text-center ${thClass('status')}" onclick="setSort('status')">Status${sortArrow('status')}</th>
          </tr>
        </thead>
        <tbody id="tradeTableBody"></tbody>
      </table>
      </div>
    </div>
  `;

  document.getElementById('lastUpdate').textContent = 'Updated ' + new Date().toLocaleTimeString('en-IN');
  renderTradeTable();
  drawCharts(s);
  renderPnlChart();
}

function renderTradeTable() {
  const body = document.getElementById('tradeTableBody');
  if (!body) return;
  const sorted = getSortedTrades();
  body.innerHTML = sorted.map((t, i) => `
    <tr>
      <td>${i + 1}</td>
      <td style="font-weight:500;color:#fff">${escapeHtml(t.symbol)}</td>
      <td><span class="${t.side === 'BUY' ? 'badge-long' : 'badge-short'}">${t.side}</span></td>
      <td class="mono">${t.entry_price}</td>
      <td class="mono">${t.exit_price}</td>
      <td class="text-right ${cls(t.net_inr)}" style="font-weight:500">${fmt(t.net_inr)}</td>
      <td class="text-right ${cls(t.roi)}">${fmtPct(t.roi)}</td>
      <td class="text-right" style="color:#666">${escapeHtml(t.exit_time)}</td>
      <td class="text-center"><span class="${t.status === 'TP' ? 'badge-tp' : 'badge-sl'}">${t.status}</span></td>
    </tr>
  `).join('');

  // Update header sort arrows / classes
  document.querySelectorAll('#tradeTable thead th.sortable').forEach(th => {
    const onclick = th.getAttribute('onclick') || '';
    const m = onclick.match(/setSort\('([^']+)'\)/);
    const key = m ? m[1] : null;
    if (!key) return;
    th.classList.toggle('sorted', sortState.key === key);
    const arrow = th.querySelector('.sort-arrow');
    if (arrow) {
      arrow.textContent = sortState.key !== key ? '↕' : (sortState.dir === 'asc' ? '↑' : '↓');
    }
  });
}

function drawCharts(s) {
  const green = '#22c55e';
  const red = '#ef4444';
  const grid = 'rgba(255,255,255,0.04)';
  const txt = 'rgba(255,255,255,0.35)';

  charts.equity = new Chart(document.getElementById('equityChart'), {
    type: 'line',
    data: {
      labels: s.equity.map((_, i) => i === 0 ? 'Start' : String(i)),
      datasets: [{
        data: s.equity,
        borderColor: '#6366f1',
        backgroundColor: 'rgba(99,102,241,0.08)',
        borderWidth: 2, fill: true, tension: 0.3, pointRadius: 0, pointHitRadius: 8
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false },
        tooltip: { callbacks: { label: c => '₹' + c.parsed.y.toLocaleString('en-IN') } }
      },
      scales: {
        x: { grid: { display: false }, ticks: { color: txt, font: { size: 10 }, maxTicksLimit: 10 } },
        y: { grid: { color: grid }, ticks: { color: txt, font: { size: 10 }, callback: v => '₹' + v.toLocaleString('en-IN') } }
      }
    }
  });

  const symSorted = [...s.symbols].sort((a, b) => b.pnl - a.pnl);
  charts.symbol = new Chart(document.getElementById('symbolChart'), {
    type: 'bar',
    data: {
      labels: symSorted.map(sym => sym.symbol + ' (' + sym.trades + 'T)'),
      datasets: [{
        data: symSorted.map(sym => Math.round(sym.pnl)),
        backgroundColor: symSorted.map(sym => sym.pnl >= 0 ? green : red),
        borderRadius: 3, barPercentage: 0.7
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false },
        tooltip: { callbacks: {
          label: c => '₹' + c.parsed.x + ' · ' + symSorted[c.dataIndex].wins + 'W/' + (symSorted[c.dataIndex].trades - symSorted[c.dataIndex].wins) + 'L · ' + symSorted[c.dataIndex].wr + '% WR'
        }}
      },
      scales: {
        x: { grid: { color: grid }, ticks: { color: txt, font: { size: 10 }, callback: v => '₹' + v } },
        y: { grid: { display: false }, ticks: { color: '#ccc', font: { size: 11 } } }
      }
    }
  });

  const allTrades = allData.trades || [];
  charts.side = new Chart(document.getElementById('sideChart'), {
    type: 'doughnut',
    data: {
      labels: ['Long TP', 'Long SL', 'Short TP', 'Short SL'],
      datasets: [{
        data: [
          allTrades.filter(t => t.side === 'BUY' && t.net_inr > 0).length,
          allTrades.filter(t => t.side === 'BUY' && t.net_inr <= 0).length,
          allTrades.filter(t => t.side === 'SELL' && t.net_inr > 0).length,
          allTrades.filter(t => t.side === 'SELL' && t.net_inr <= 0).length,
        ],
        backgroundColor: ['#22c55e', '#ef4444', '#818cf8', '#f97316'],
        borderWidth: 0, spacing: 2
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '55%',
      plugins: {
        legend: { display: true, position: 'bottom', labels: { color: '#aaa', font: { size: 11 }, padding: 12, usePointStyle: true, pointStyleWidth: 8 } },
        tooltip: { callbacks: { label: c => c.label + ': ' + c.parsed + ' trades' } }
      }
    }
  });
}

function renderPnlChart() {
  const green = '#22c55e';
  const red = '#ef4444';
  const grid = 'rgba(255,255,255,0.04)';
  const txt = 'rgba(255,255,255,0.35)';

  const filtered = getFilteredPerTradeTrades();
  const countEl = document.getElementById('pnlChartCount');
  if (countEl) {
    if (filtered.length) {
      const sumInr = filtered.reduce((a, t) => a + t.net_inr, 0);
      countEl.innerHTML = `${filtered.length} trade${filtered.length === 1 ? '' : 's'} · <span class="${cls(sumInr)}">${fmt(sumInr)}</span>`;
    } else {
      countEl.textContent = 'no trades';
    }
  }

  if (charts.pnl) { charts.pnl.destroy(); charts.pnl = null; }
  const canvas = document.getElementById('pnlChart');
  if (!canvas) return;

  charts.pnl = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: filtered.map((_, i) => String(i + 1)),
      datasets: [{
        data: filtered.map(t => Math.round(t.net_inr)),
        backgroundColor: filtered.map(t => t.net_inr >= 0 ? green : red),
        borderRadius: 2, barPercentage: 0.85
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false },
        tooltip: { callbacks: {
          label: c => filtered[c.dataIndex].symbol + ' · ' + filtered[c.dataIndex].side + ': ₹' + c.parsed.y,
          title: c => filtered[c[0].dataIndex].exit_time + ' (' + filtered[c[0].dataIndex].exit_date + ')'
        }}
      },
      scales: {
        x: { grid: { display: false }, ticks: { color: txt, font: { size: 10 }, maxTicksLimit: 12 } },
        y: { grid: { color: grid }, ticks: { color: txt, font: { size: 10 }, callback: v => '₹' + v } }
      }
    }
  });
}

async function manualRefresh() {
  try { await fetch('/api/refresh', {cache: 'no-store'}); } catch(e) {}
  await fetchData();
}

fetchData();
refreshInterval = setInterval(fetchData, 30000);
</script>
</body>
</html>
